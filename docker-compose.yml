version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: knowledge_starmap
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  postgres_data:
